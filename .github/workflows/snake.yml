name: generate animation

on:
  # 매 24시간마다 자동 실행
  schedule:
    - cron: "0 0 * * *" 
  
  # 수동으로 실행 가능하게 설정
  workflow_dispatch:
  
  # main 브랜치에 푸시될 때마다 실행
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # 깃허브 잔디 데이터를 기반으로 애니메이션 생성
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
            dist/github-contribution-grid-snake-dark.svg?color_snake=#f72585&color_dots=#240046,#3c096c,#5a189a,#7b2cbf,#9d4edd
          
      # 생성된 파일을 output 브랜치에 푸시 (관리하기 편하게 별도 브랜치 사용)
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
